<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="560" fill="#FAF6EA"/>

  <!-- 左上：歯車（大） -->
  <g transform="translate(45,40)" fill="none" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.18">
    <circle cx="40" cy="40" r="22"/>
    <circle cx="40" cy="40" r="9"/>
    <g>
      <line x1="40" y1="8" x2="40" y2="18"/>
      <line x1="40" y1="62" x2="40" y2="72"/>
      <line x1="8" y1="40" x2="18" y2="40"/>
      <line x1="62" y1="40" x2="72" y2="40"/>
      <line x1="17" y1="17" x2="24" y2="24"/>
      <line x1="56" y1="56" x2="63" y2="63"/>
      <line x1="63" y1="17" x2="56" y2="24"/>
      <line x1="24" y1="56" x2="17" y2="63"/>
    </g>
  </g>

  <!-- 右上：チェックリスト -->
  <g transform="translate(670,50)" fill="none" stroke="#C8A84E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <rect x="0" y="0" width="80" height="68" rx="6"/>
    <path d="M10 16 l6 6 l12 -12"/>
    <line x1="36" y1="18" x2="68" y2="18"/>
    <path d="M10 36 l6 6 l12 -12"/>
    <line x1="36" y1="38" x2="68" y2="38"/>
    <path d="M10 56 l6 6 l12 -12" stroke-opacity="0.5"/>
    <line x1="36" y1="58" x2="60" y2="58" stroke-opacity="0.5"/>
  </g>

  <!-- 左下：流れの矢印 -->
  <g transform="translate(40,440)" fill="none" stroke="#C8A84E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
    <path d="M0 30 q30 -30 60 0 t60 0"/>
    <path d="M118 24 l8 6 l-8 6"/>
  </g>

  <!-- 右下：人2人（チーム） -->
  <g transform="translate(680,460)" fill="none" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.22">
    <circle cx="18" cy="14" r="8"/>
    <path d="M2 50 q0 -16 16 -16 t16 16"/>
    <circle cx="48" cy="18" r="6"/>
    <path d="M36 52 q0 -12 12 -12 t12 12"/>
  </g>

  <!-- 流れる点線 -->
  <g stroke="#1B2A4A" stroke-width="1.5" stroke-dasharray="2 6" stroke-linecap="round" fill="none" opacity="0.15">
    <path d="M130 90 q120 -20 240 60"/>
    <path d="M450 470 q120 -50 230 -10"/>
  </g>
</svg>
