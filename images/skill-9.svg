<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E6C97A"/>
      <stop offset="1" stop-color="#B8923C"/>
    </linearGradient>
  </defs>

  <!-- ネイビー背景 -->
  <rect width="256" height="256" fill="#0F1B33"/>

  <!-- 背面スライド（影） -->
  <rect x="50" y="58" width="156" height="100" rx="6"
        fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.35"/>
  <rect x="42" y="66" width="156" height="100" rx="6"
        fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.55"/>

  <!-- メインスライド枠 -->
  <rect x="34" y="74" width="156" height="104" rx="6"
        fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- スライドヘッダーバー -->
  <line x1="34" y1="92" x2="190" y2="92" stroke="url(#goldGrad)" stroke-width="2"/>
  <circle cx="44" cy="83" r="2" fill="url(#goldGrad)"/>
  <circle cx="52" cy="83" r="2" fill="url(#goldGrad)"/>
  <circle cx="60" cy="83" r="2" fill="url(#goldGrad)"/>

  <!-- タイトルライン -->
  <line x1="46" y1="106" x2="120" y2="106" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="115" x2="92" y2="115" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- 棒グラフ -->
  <g stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round">
    <line x1="48" y1="165" x2="48" y2="148"/>
    <line x1="58" y1="165" x2="58" y2="138"/>
    <line x1="68" y1="165" x2="68" y2="128"/>
    <line x1="78" y1="165" x2="78" y2="120"/>
    <line x1="44" y1="167" x2="86" y2="167"/>
  </g>

  <!-- 折れ線（右側） -->
  <polyline points="100,160 118,148 134,152 150,134 168,124 180,128"
            fill="none" stroke="url(#goldGrad)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="160" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="118" cy="148" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="134" cy="152" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="150" cy="134" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="168" cy="124" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="180" cy="128" r="2.5" fill="url(#goldGrad)"/>

  <!-- ページインジケーター -->
  <g fill="url(#goldGrad)">
    <rect x="96" y="194" width="14" height="3" rx="1.5"/>
    <rect x="114" y="194" width="14" height="3" rx="1.5" opacity="0.4"/>
    <rect x="132" y="194" width="14" height="3" rx="1.5" opacity="0.4"/>
    <rect x="150" y="194" width="14" height="3" rx="1.5" opacity="0.4"/>
  </g>

  <!-- 装飾ライン（角） -->
  <g stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <path d="M16 30 l0 -10 l10 0"/>
    <path d="M240 30 l0 -10 l-10 0"/>
    <path d="M16 226 l0 10 l10 0"/>
    <path d="M240 226 l0 10 l-10 0"/>
  </g>

  <!-- スパークル -->
  <g fill="url(#goldGrad)" opacity="0.85">
    <path d="M210 56 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 l6 -2 z"/>
    <path d="M30 200 l1.5 4 l4 1.5 l-4 1.5 l-1.5 4 l-1.5 -4 l-4 -1.5 l4 -1.5 z"/>
  </g>
</svg>
